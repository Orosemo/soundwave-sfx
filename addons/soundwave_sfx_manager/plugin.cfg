[plugin]

name="sound wave sfx manager"
description="The Soundwave SFX Manager is an helpful godot plugin that adds two new Nodes: SoundwaveSfx2D and SoundwaveSfx3D which are nodes used to play sounds from a predefined list. It is able to handle overlapping sounds which make it capable of handling multiple different sfx at the same time."
author="Orosemo"
version="1.0.0"
script="soundwave_sfx_manager.gd"
